<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech-to-Text Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2e3248;
      --accent:   #6c63ff;
      --accent2:  #4caf8f;
      --text:     #e2e4ef;
      --muted:    #7b7f9e;
      --danger:   #e05c5c;
      --radius:   12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p  { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 680px;
    }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(108,99,255,.06);
    }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: .5rem; }
    .drop-zone p { color: var(--muted); font-size: 0.9rem; }
    .drop-zone p strong { color: var(--text); }
    #file-input { display: none; }
    #selected-file {
      margin-top: .75rem;
      font-size: .85rem;
      color: var(--accent2);
      min-height: 1.2em;
    }

    /* ── Options grid ── */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    @media (max-width: 480px) { .options { grid-template-columns: 1fr; } }

    label { display: block; font-size: .83rem; color: var(--muted); margin-bottom: .35rem; }

    select, input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .5rem .75rem;
      font-size: .9rem;
      transition: border-color .15s;
    }
    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1.2rem;
    }
    .checkbox-row input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .checkbox-row label { font-size: .9rem; color: var(--text); margin: 0; cursor: pointer; }

    /* ── Submit button ── */
    #submit-btn {
      margin-top: 1.75rem;
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    #submit-btn:hover:not(:disabled) { opacity: .88; }
    #submit-btn:active:not(:disabled) { transform: scale(.98); }
    #submit-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Progress ── */
    #progress-section { display: none; margin-top: 2rem; }
    .progress-label { font-size: .88rem; color: var(--muted); margin-bottom: .5rem; }
    .progress-bar-track {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 30%;
      animation: slide 1.4s ease-in-out infinite alternate;
    }
    @keyframes slide { from { margin-left: 0%; width: 30%; } to { margin-left: 70%; width: 30%; } }
    #progress-text {
      margin-top: .5rem;
      font-size: .85rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    /* ── Result ── */
    #result-section { display: none; margin-top: 2rem; }
    #result-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: .75rem; }

    #result-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-size: .88rem;
      line-height: 1.65;
      white-space: pre-wrap;
      max-height: 320px;
      overflow-y: auto;
      color: var(--text);
    }

    .result-actions {
      display: flex;
      gap: .75rem;
      margin-top: .75rem;
      flex-wrap: wrap;
    }
    .btn-secondary {
      flex: 1;
      padding: .55rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .88rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(108,99,255,.08); }
    #download-btn {
      flex: 1;
      padding: .55rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent2);
      color: #fff;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s;
    }
    #download-btn:hover { opacity: .85; }

    /* ── Error ── */
    #error-section {
      display: none;
      margin-top: 2rem;
      background: rgba(224,92,92,.12);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 1rem;
      font-size: .9rem;
      color: var(--danger);
    }
  </style>
</head>
<body>

<header>
  <h1>Speech<span>-to-</span>Text</h1>
  <p>Offline transcription powered by OpenAI Whisper &nbsp;·&nbsp; No API key needed</p>
</header>

<div class="card">

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Upload audio file">
    <div class="icon">🎙️</div>
    <p><strong>Click to browse</strong> or drag &amp; drop your audio file here</p>
    <p style="margin-top:.3rem">MP3 · WAV · M4A · OGG · FLAC · MP4</p>
    <input type="file" id="file-input" accept=".mp3,.wav,.m4a,.ogg,.flac,.mp4,.webm,.aac,.wma" />
    <div id="selected-file"></div>
  </div>

  <!-- Options -->
  <div class="options">
    <div>
      <label for="model-select">Whisper Model</label>
      <select id="model-select">
        {% for m in models %}
        <option value="{{ m }}" {% if m == 'base' %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="lang-input">Language <span style="color:var(--muted)">(optional)</span></label>
      <input type="text" id="lang-input" placeholder="e.g. en, fr, es, de …" maxlength="10" />
    </div>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="ts-check" />
    <label for="ts-check">Include timestamps in output</label>
  </div>

  <button id="submit-btn" disabled>Transcribe</button>

  <!-- Progress -->
  <div id="progress-section">
    <div class="progress-label">Processing …</div>
    <div class="progress-bar-track"><div class="progress-bar-fill"></div></div>
    <div id="progress-text">Starting …</div>
  </div>

  <!-- Error -->
  <div id="error-section"></div>

  <!-- Result -->
  <div id="result-section">
    <h2>✅ Transcription</h2>
    <div id="result-text"></div>
    <div class="result-actions">
      <button class="btn-secondary" id="copy-btn">📋 Copy to clipboard</button>
      <a id="download-btn" href="#" download="transcription.txt">⬇ Download .txt</a>
    </div>
  </div>

</div><!-- .card -->

<script>
  "use strict";

  const dropZone    = document.getElementById("drop-zone");
  const fileInput   = document.getElementById("file-input");
  const selectedLbl = document.getElementById("selected-file");
  const submitBtn   = document.getElementById("submit-btn");
  const progressSec = document.getElementById("progress-section");
  const progressTxt = document.getElementById("progress-text");
  const errorSec    = document.getElementById("error-section");
  const resultSec   = document.getElementById("result-section");
  const resultTxt   = document.getElementById("result-text");
  const copyBtn     = document.getElementById("copy-btn");
  const downloadBtn = document.getElementById("download-btn");
  const modelSel    = document.getElementById("model-select");
  const langInput   = document.getElementById("lang-input");
  const tsCheck     = document.getElementById("ts-check");

  let selectedFile = null;
  let pollInterval = null;

  // ── File selection ──────────────────────────────────────────────────────
  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });

  fileInput.addEventListener("change", () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  function setFile(file) {
    selectedFile = file;
    const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
    selectedLbl.textContent = `📎 ${file.name}  (${sizeMB} MB)`;
    submitBtn.disabled = false;
  }

  // ── Submit ──────────────────────────────────────────────────────────────
  submitBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    resetUI();
    submitBtn.disabled = true;
    progressSec.style.display = "block";

    const fd = new FormData();
    fd.append("file",       selectedFile);
    fd.append("model",      modelSel.value);
    fd.append("language",   langInput.value.trim());
    fd.append("timestamps", tsCheck.checked ? "true" : "false");

    let jobId;
    try {
      const resp = await fetch("/transcribe", { method: "POST", body: fd });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || "Upload failed.");
      jobId = data.job_id;
    } catch (err) {
      showError(err.message);
      return;
    }

    // Poll for completion
    pollInterval = setInterval(() => pollStatus(jobId), 2500);
  });

  // ── Polling ─────────────────────────────────────────────────────────────
  async function pollStatus(jobId) {
    try {
      const resp = await fetch(`/status/${jobId}`);
      const data = await resp.json();

      if (!resp.ok) { stopPolling(); showError(data.error || "Unknown error."); return; }

      progressTxt.textContent = data.progress || "Working …";

      if (data.status === "completed") {
        stopPolling();
        showResult(data.text, data.output_file);
      } else if (data.status === "failed") {
        stopPolling();
        showError(data.error || "Transcription failed.");
      }
    } catch (_) {
      // Network hiccup — keep polling
    }
  }

  function stopPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    progressSec.style.display = "none";
    submitBtn.disabled = false;
  }

  // ── Result display ───────────────────────────────────────────────────────
  function showResult(text, outputFile) {
    resultTxt.textContent = text;
    if (outputFile) {
      downloadBtn.href = `/download/${encodeURIComponent(outputFile)}`;
    }
    resultSec.style.display = "block";
    resultSec.scrollIntoView({ behavior: "smooth" });
  }

  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(resultTxt.textContent).then(() => {
      copyBtn.textContent = "✅ Copied!";
      setTimeout(() => { copyBtn.textContent = "📋 Copy to clipboard"; }, 2000);
    });
  });

  // ── Error display ────────────────────────────────────────────────────────
  function showError(msg) {
    errorSec.textContent = "⚠️  " + msg;
    errorSec.style.display = "block";
    progressSec.style.display = "none";
  }

  function resetUI() {
    errorSec.style.display  = "none";
    resultSec.style.display = "none";
    progressTxt.textContent = "Starting …";
  }
</script>

</body>
</html>
